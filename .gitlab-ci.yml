stages:
  - scan
  - build-and-push

variables:
  # Using Pipeline ID and Commit SHA to generate a robust unique ID
  UNIQUE_IMAGE_TAG: "${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}"

# 1. Scan filesystem
filesystem_scan:
  stage: scan
  image:
    name: aquasec/trivy:0.48.3
    entrypoint: [""]
  script:
    - echo "Scanning project files for vulnerabilities..."
    - trivy fs --format table --exit-code 0 --severity HIGH,CRITICAL .

# ---------------------------------------------------------
# Template for building, scanning and pushing services
# ---------------------------------------------------------
.docker_build_template:
  stage: build-and-push
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - export BUILD_ARGS=${BUILD_ARGS:-""}
    
    # Login to Docker Hub
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    
    - IMAGE_TAG="${DOCKERHUB_USERNAME}/${SERVICE_NAME}:${UNIQUE_IMAGE_TAG}"
    - LATEST_TAG="${DOCKERHUB_USERNAME}/${SERVICE_NAME}:latest"
    - echo "Building docker image for ${SERVICE_NAME}..."
    - docker build $BUILD_ARGS -t $IMAGE_TAG -t $LATEST_TAG ${CONTEXT_DIR}
    
    # Run Trivy to scan the built image inside docker host mapping
    - echo "Scanning ${IMAGE_TAG}..."
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - trivy image --format table --exit-code 0 --severity HIGH,CRITICAL $IMAGE_TAG
    
    # Push image to Docker Hub
    - echo "Successfully built and scanned, pushing both unique and latest tags..."
    - docker push $IMAGE_TAG
    - docker push $LATEST_TAG

# ---------------------------------------------------------
# Explicit Jobs for Each Service
# ---------------------------------------------------------
build_scan_push_auth_service:
  extends: .docker_build_template
  variables:
    SERVICE_NAME: "auth-service"
    CONTEXT_DIR: "./services/auth-service"

build_scan_push_project_service:
  extends: .docker_build_template
  variables:
    SERVICE_NAME: "project-service"
    CONTEXT_DIR: "./services/project-service"

build_scan_push_database_service:
  extends: .docker_build_template
  variables:
    SERVICE_NAME: "database-service"
    CONTEXT_DIR: "./services/database-service"

build_scan_push_analytics_service:
  extends: .docker_build_template
  variables:
    SERVICE_NAME: "analytics-service"
    CONTEXT_DIR: "./services/analytics-service"

build_scan_push_nginx_gateway:
  extends: .docker_build_template
  variables:
    SERVICE_NAME: "nginx-gateway"
    CONTEXT_DIR: "./services/nginx-gateway"

build_scan_push_frontend:
  extends: .docker_build_template
  variables:
    SERVICE_NAME: "frontend"
    CONTEXT_DIR: "./frontend"
    BUILD_ARGS: "--build-arg NEXT_PUBLIC_API_URL=/api"