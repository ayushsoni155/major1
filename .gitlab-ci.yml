stages:
  - scan
  - build-and-push

variables:
  # Using Pipeline ID and Commit SHA to generate a robust unique ID
  UNIQUE_IMAGE_TAG: "${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}"

# 1. Scan filesystem
filesystem_scan:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - echo "Scanning project files for vulnerabilities..."
    - trivy fs --format table --exit-code 0 --severity HIGH,CRITICAL .

# 2. Build, Scan, and Push images using parallel matrix for efficiency
build_scan_push_services:
  stage: build-and-push
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  parallel:
    matrix:
      - SERVICE_NAME: "auth-service"
        CONTEXT_DIR: "./services/auth-service"
      - SERVICE_NAME: "project-service"
        CONTEXT_DIR: "./services/project-service"
      - SERVICE_NAME: "database-service"
        CONTEXT_DIR: "./services/database-service"
      - SERVICE_NAME: "analytics-service"
        CONTEXT_DIR: "./services/analytics-service"
      - SERVICE_NAME: "nginx-gateway"
        CONTEXT_DIR: "./services/nginx-gateway"
      - SERVICE_NAME: "frontend"
        CONTEXT_DIR: "./frontend"
        BUILD_ARGS: "--build-arg NEXT_PUBLIC_API_URL=/api"
  script:
    # Set default values if BUILD_ARGS isn't defined explicitly in the matrix list
    - export BUILD_ARGS=${BUILD_ARGS:-""}
    
    # Login to Docker Hub
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    
    - IMAGE_TAG="${DOCKERHUB_USERNAME}/${SERVICE_NAME}:${UNIQUE_IMAGE_TAG}"
    - echo "Building docker image for ${SERVICE_NAME}..."
    - docker build $BUILD_ARGS -t $IMAGE_TAG ${CONTEXT_DIR}
    
    # Run Trivy to scan the built image inside docker host mapping
    - echo "Scanning ${IMAGE_TAG}..."
    # We download trivy locally to scan without nested Docker-in-Docker complexities for volume mappings
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.48.3
    - trivy image --format table --exit-code 0 --severity HIGH,CRITICAL $IMAGE_TAG
    
    # Push image to Docker Hub
    - echo "Successfully built and scanned ${IMAGE_TAG}, pushing to Registry..."
    - docker push $IMAGE_TAG