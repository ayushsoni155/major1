apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-service
  namespace: rapidbase
  labels:
    app: project-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-service
  template:
    metadata:
      labels:
        app: project-service
    spec:
      containers:
        - name: project-service
          image: ayushsoni155/project-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4002
          envFrom:
            - configMapRef:
                name: project-service-config
            - secretRef:
                name: project-service-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
