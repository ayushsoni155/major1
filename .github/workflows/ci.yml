name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # 1. Filesystem Vulnerability Scan
  # ─────────────────────────────────────────────
  filesystem_scan:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        id: trivy_fs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-fs-results.txt'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'

      - name: Upload scan results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-results
          path: trivy-fs-results.txt
          retention-days: 7

      - name: Send failure email — Filesystem Scan
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.ALERT_EMAIL_ADDRESS }}
          from: "RapidBase CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "❌ Pipeline Failed — Filesystem Scan | ${{ github.repository }}"
          html_body: |
            <div style="font-family:Inter,Arial,sans-serif;max-width:640px;margin:0 auto;background:#0d1117;color:#e6edf3;border-radius:12px;overflow:hidden;border:1px solid #30363d">
              <div style="background:linear-gradient(135deg,#da3633,#b91c1c);padding:28px 32px">
                <h1 style="margin:0;font-size:22px;font-weight:700">❌ Pipeline Failed</h1>
                <p style="margin:6px 0 0;opacity:.85;font-size:14px">Filesystem vulnerability scan did not complete successfully</p>
              </div>
              <div style="padding:28px 32px">
                <table style="width:100%;border-collapse:collapse;font-size:14px;margin-bottom:24px">
                  <tr><td style="padding:8px 0;color:#8b949e;width:140px">📦 Repository</td><td style="padding:8px 0;font-weight:600">${{ github.repository }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">🌿 Branch</td><td style="padding:8px 0;font-weight:600">${{ github.ref_name }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">💬 Commit</td><td style="padding:8px 0;font-family:monospace;font-size:13px">${{ github.sha }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">👤 Author</td><td style="padding:8px 0">${{ github.actor }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">💥 Failed Job</td><td style="padding:8px 0"><span style="background:#da3633;color:#fff;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700">Filesystem Scan</span></td></tr>
                </table>
                <div style="background:#161b22;border:1px solid #30363d;border-left:4px solid #da3633;border-radius:8px;padding:16px;margin-bottom:24px">
                  <p style="margin:0;font-size:13px;color:#f85149;font-weight:600">⚠️ What failed</p>
                  <p style="margin:8px 0 0;font-size:13px;color:#8b949e">The Trivy filesystem scan job failed. Check the attached <code style="background:#21262d;padding:2px 6px;border-radius:4px">trivy-fs-results.txt</code> for vulnerabilities found in the source code.</p>
                </div>
                <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="display:inline-block;background:linear-gradient(135deg,#da3633,#b91c1c);color:#fff;text-decoration:none;padding:12px 24px;border-radius:8px;font-weight:600;font-size:14px">🔍 View Full Logs</a>
              </div>
              <div style="padding:16px 32px;background:#161b22;border-top:1px solid #30363d;font-size:12px;color:#484f58;text-align:center">
                RapidBase CI/CD • Run #${{ github.run_number }} • ${{ github.workflow }}
              </div>
            </div>
          attachments: trivy-fs-results.txt

  # ─────────────────────────────────────────────
  # 2. Build, Scan & Push — Matrix per service
  # ─────────────────────────────────────────────
  build_and_push:
    name: Build & Push — ${{ matrix.service.name }}
    needs: filesystem_scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: "auth-service"
            context: "./services/auth-service"
            build_args: ""
          - name: "project-service"
            context: "./services/project-service"
            build_args: ""
          - name: "database-service"
            context: "./services/database-service"
            build_args: ""
          - name: "analytics-service"
            context: "./services/analytics-service"
            build_args: ""
          - name: "nginx-gateway"
            context: "./services/nginx-gateway"
            build_args: ""
          - name: "frontend"
            context: "./frontend"
            build_args: "--build-arg NEXT_PUBLIC_API_URL=/api"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Short SHA
        id: vars
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Set Image Tags
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          UNIQUE_TAG="${{ github.run_id }}-${{ env.SHORT_SHA }}"
          echo "IMAGE_TAG=${DOCKER_USER}/${{ matrix.service.name }}:${UNIQUE_TAG}" >> $GITHUB_ENV
          echo "LATEST_TAG=${DOCKER_USER}/${{ matrix.service.name }}:latest" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        id: build
        run: |
          docker build ${{ matrix.service.build_args }} \
            -t ${{ env.IMAGE_TAG }} \
            -t ${{ env.LATEST_TAG }} \
            ${{ matrix.service.context }} 2>&1 | tee build-log.txt

      - name: Run Trivy image scan
        id: trivy_image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: 'table'
          output: 'trivy-image-results.txt'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'

      - name: Push Docker Images
        id: push
        run: |
          docker push ${{ env.IMAGE_TAG }}
          docker push ${{ env.LATEST_TAG }}

      - name: Send failure email — Build/Push
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.ALERT_EMAIL_ADDRESS }}
          from: "RapidBase CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "❌ Pipeline Failed — ${{ matrix.service.name }} | ${{ github.repository }}"
          html_body: |
            <div style="font-family:Inter,Arial,sans-serif;max-width:640px;margin:0 auto;background:#0d1117;color:#e6edf3;border-radius:12px;overflow:hidden;border:1px solid #30363d">
              <div style="background:linear-gradient(135deg,#da3633,#b91c1c);padding:28px 32px">
                <h1 style="margin:0;font-size:22px;font-weight:700">❌ Build Failed</h1>
                <p style="margin:6px 0 0;opacity:.85;font-size:14px">A service failed to build or push in your CI pipeline</p>
              </div>
              <div style="padding:28px 32px">
                <table style="width:100%;border-collapse:collapse;font-size:14px;margin-bottom:24px">
                  <tr><td style="padding:8px 0;color:#8b949e;width:140px">📦 Repository</td><td style="padding:8px 0;font-weight:600">${{ github.repository }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">🌿 Branch</td><td style="padding:8px 0;font-weight:600">${{ github.ref_name }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">💬 Commit</td><td style="padding:8px 0;font-family:monospace;font-size:13px">${{ github.sha }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">👤 Author</td><td style="padding:8px 0">${{ github.actor }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">🐳 Service</td><td style="padding:8px 0"><span style="background:#da3633;color:#fff;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700">${{ matrix.service.name }}</span></td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">🏷️ Image Tag</td><td style="padding:8px 0;font-family:monospace;font-size:12px">${{ env.IMAGE_TAG }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">⚡ Step</td><td style="padding:8px 0">
                    ${{ steps.build.outcome == 'failure' && '<span style="background:#da3633;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px">docker build</span>' || '' }}
                    ${{ steps.trivy_image.outcome == 'failure' && '<span style="background:#da3633;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px">trivy image scan</span>' || '' }}
                    ${{ steps.push.outcome == 'failure' && '<span style="background:#da3633;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px">docker push</span>' || '' }}
                  </td></tr>
                </table>
                <div style="background:#161b22;border:1px solid #30363d;border-left:4px solid #da3633;border-radius:8px;padding:16px;margin-bottom:24px">
                  <p style="margin:0;font-size:13px;color:#f85149;font-weight:600">⚠️ What to do</p>
                  <p style="margin:8px 0 0;font-size:13px;color:#8b949e">Check the full build log in the attached file and view the Actions run for the complete error output. Fix the issue and push again to re-trigger the pipeline.</p>
                </div>
                <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="display:inline-block;background:linear-gradient(135deg,#da3633,#b91c1c);color:#fff;text-decoration:none;padding:12px 24px;border-radius:8px;font-weight:600;font-size:14px">🔍 View Full Logs</a>
              </div>
              <div style="padding:16px 32px;background:#161b22;border-top:1px solid #30363d;font-size:12px;color:#484f58;text-align:center">
                RapidBase CI/CD • Run #${{ github.run_number }} • ${{ github.workflow }}
              </div>
            </div>
          attachments: build-log.txt

  # ─────────────────────────────────────────────
  # 3. Final — Success notification (runs only if ALL jobs passed)
  # ─────────────────────────────────────────────
  notify_success:
    name: Notify Success
    needs: [filesystem_scan, build_and_push]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Send success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.ALERT_EMAIL_ADDRESS }}
          from: "RapidBase CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "✅ Pipeline Passed — ${{ github.repository }}"
          html_body: |
            <div style="font-family:Inter,Arial,sans-serif;max-width:640px;margin:0 auto;background:#0d1117;color:#e6edf3;border-radius:12px;overflow:hidden;border:1px solid #30363d">
              <div style="background:linear-gradient(135deg,#238636,#196127);padding:28px 32px">
                <h1 style="margin:0;font-size:22px;font-weight:700">✅ Pipeline Passed</h1>
                <p style="margin:6px 0 0;opacity:.85;font-size:14px">All jobs completed successfully — images are live on Docker Hub</p>
              </div>
              <div style="padding:28px 32px">
                <table style="width:100%;border-collapse:collapse;font-size:14px;margin-bottom:24px">
                  <tr><td style="padding:8px 0;color:#8b949e;width:140px">📦 Repository</td><td style="padding:8px 0;font-weight:600">${{ github.repository }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">🌿 Branch</td><td style="padding:8px 0;font-weight:600">${{ github.ref_name }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">💬 Commit</td><td style="padding:8px 0;font-family:monospace;font-size:13px">${{ github.sha }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">👤 Author</td><td style="padding:8px 0">${{ github.actor }}</td></tr>
                  <tr><td style="padding:8px 0;color:#8b949e">🏃 Run</td><td style="padding:8px 0">#${{ github.run_number }}</td></tr>
                </table>
                <div style="background:#161b22;border:1px solid #30363d;border-left:4px solid #238636;border-radius:8px;padding:16px;margin-bottom:24px">
                  <p style="margin:0;font-size:13px;color:#3fb950;font-weight:600">🚀 What was deployed</p>
                  <ul style="margin:8px 0 0;padding-left:20px;font-size:13px;color:#8b949e;line-height:2">
                    <li>✔ Filesystem vulnerability scan passed</li>
                    <li>✔ auth-service → Docker Hub</li>
                    <li>✔ project-service → Docker Hub</li>
                    <li>✔ database-service → Docker Hub</li>
                    <li>✔ analytics-service → Docker Hub</li>
                    <li>✔ nginx-gateway → Docker Hub</li>
                    <li>✔ frontend → Docker Hub</li>
                  </ul>
                </div>
                <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="display:inline-block;background:linear-gradient(135deg,#238636,#196127);color:#fff;text-decoration:none;padding:12px 24px;border-radius:8px;font-weight:600;font-size:14px">📋 View Run Details</a>
              </div>
              <div style="padding:16px 32px;background:#161b22;border-top:1px solid #30363d;font-size:12px;color:#484f58;text-align:center">
                RapidBase CI/CD • Run #${{ github.run_number }} • ${{ github.workflow }}
              </div>
            </div>