events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ============================================
    # Upstream definitions
    # ============================================
    upstream frontend_upstream {
        server frontend:3000;
    }

    upstream auth_upstream {
        server auth-service:4001;
    }

    upstream project_upstream {
        server project-service:4002;
    }

    upstream database_upstream {
        server database-service:4003;
    }

    upstream analytics_upstream {
        server analytics-service:4004;
    }

    upstream postgrest_upstream {
        server postgrest:3001;
    }

    # ============================================
    # Main Server Block — Port 80
    # ============================================
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- Gateway health check ----
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"nginx-gateway"}';
        }

        # ---- Auth Service ----
        location /api/auth/ {
            proxy_pass http://auth_upstream/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Forward cookies to/from auth service
            proxy_pass_header Set-Cookie;
        }

        # ---- SSE: Notification Stream (must be BEFORE general project proxy) ----
        location = /api/projects/notifications/stream {
            proxy_pass http://project_upstream/projects/notifications/stream;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie          $http_cookie;
            # SSE-critical settings
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            chunked_transfer_encoding off;
            # Prevent Nginx from buffering the SSE stream
            proxy_set_header X-Accel-Buffering no;
        }

        # ---- Project Service ----
        location /api/projects/ {
            proxy_pass http://project_upstream/projects/;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie          $http_cookie;
        }

        # ---- Schema Service ----
        location /api/schema/ {
            proxy_pass http://project_upstream/schema/;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie          $http_cookie;
        }

        # ---- Database / Query Service ----
        location /api/query/ {
            proxy_pass http://database_upstream/query/;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie          $http_cookie;
        }

        # ---- Audit Log ----
        location /api/auditlog {
            proxy_pass http://database_upstream/query/audit-logs;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie          $http_cookie;
        }

        # ---- Analytics Service ----
        location /api/analytics/ {
            proxy_pass http://analytics_upstream/analytics/;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie          $http_cookie;
        }

        # ---- Internal API Token Validation ----
        # Forwards the original request's auth headers, origin, and HTTP method
        # to the project-service for JWT verification + security checks.
        location = /_validate_api_key {
            internal;
            proxy_pass http://project_upstream/projects/validate-api-key;
            proxy_pass_request_body off;
            proxy_set_header Content-Length       "";
            proxy_set_header X-Original-URI       $request_uri;
            proxy_set_header X-Original-Method    $request_method;
            proxy_set_header X-Original-Origin    $http_origin;
            # Forward both auth mechanisms to validation endpoint
            proxy_set_header Authorization         $http_authorization;
            proxy_set_header x-api-key             $http_x_api_key;
        }

        # ---- PostgREST: CORS Preflight Handler ----
        # Handles OPTIONS requests before auth_request so browsers can preflight.
        location = /api/rest/preflight {
            internal;
        }

        # ---- PostgREST (JWT Token protected) — Schema-isolated REST API ----
        location /api/rest/ {
            # Handle CORS preflight (OPTIONS) without requiring authentication
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $http_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, x-api-key, Content-Type, Accept, Prefer, Accept-Profile, Content-Profile' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }

            # Validate JWT token via project-service
            auth_request /_validate_api_key;
            auth_request_set $auth_schema       $upstream_http_x_schema_name;
            auth_request_set $allowed_origin     $upstream_http_x_allowed_origin;

            # Proxy to PostgREST
            proxy_pass http://postgrest_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;

            # CRITICAL: Strip auth headers before reaching PostgREST.
            # Our middleware already verified the JWT. PostgREST should treat
            # this as an authenticated web_anon request with schema isolation
            # handled via Accept-Profile / Content-Profile.
            proxy_set_header Authorization   "";
            proxy_set_header x-api-key       "";

            # Forward schema profile to PostgREST for per-project isolation
            # Accept-Profile = schema to read from, Content-Profile = schema to write to
            proxy_set_header Accept-Profile  $auth_schema;
            proxy_set_header Content-Profile $auth_schema;

            # CORS response headers — use the validated allowed origin
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, x-api-key, Content-Type, Accept, Prefer, Accept-Profile, Content-Profile' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Range, Content-Length, X-Total-Count' always;
        }

        # ---- Next.js Frontend (catch-all) ----
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket support for Next.js HMR (dev) and live features
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
