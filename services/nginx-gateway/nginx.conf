events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Nginx API Gateway
    server {
        listen 5000;
        server_name localhost;

        # Global CORS
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-api-key,x-project-id' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Health check
        location /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"nginx-gateway"}';
        }

        # Auth Service
        location /api/auth/ {
            proxy_pass http://auth-service:4001/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Project Service
        location /api/projects/ {
            proxy_pass http://project-service:4002/projects/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Schema Service (handled by project-service)
        location /api/schema/ {
            proxy_pass http://project-service:4002/schema/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Database Query Service
        location /api/query/ {
            proxy_pass http://database-service:4003/query/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Audit Logs Service
        location /api/auditlog/ {
            proxy_pass http://database-service:4003/query/audit-logs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Analytics Service
        location /api/analytics/ {
            proxy_pass http://analytics-service:4004/analytics/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Internal API Key Validation endpoint
        location = /_validate_api_key {
            internal;
            proxy_pass http://project-service:4002/projects/validate-api-key;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Origin $http_origin;
            proxy_set_header x-api-key $http_x_api_key;
        }

        # PostgREST routes (Protected by API Key)
        location /api/rest/ {
            auth_request /_validate_api_key;
            auth_request_set $auth_schema $upstream_http_x_schema_name;

            proxy_pass http://postgrest:3001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Profile $auth_schema;
            proxy_set_header Content-Profile $auth_schema;
        }
    }
}
