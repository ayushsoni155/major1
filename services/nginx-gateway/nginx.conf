events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ============================================
    # Upstream definitions
    # ============================================
    upstream frontend_upstream {
        server frontend:3000;
    }

    upstream auth_upstream {
        server auth-service:4001;
    }

    upstream project_upstream {
        server project-service:4002;
    }

    upstream database_upstream {
        server database-service:4003;
    }

    upstream analytics_upstream {
        server analytics-service:4004;
    }

    upstream postgrest_upstream {
        server postgrest:3001;
    }

    # ============================================
    # Main Server Block — Port 80
    # ============================================
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ---- Gateway health check ----
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"nginx-gateway"}';
        }

        # ---- Auth Service ----
        location /api/auth/ {
            proxy_pass http://auth_upstream/auth/;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Forward cookies to/from auth service
            proxy_pass_header Set-Cookie;
        }

        # ---- Project Service ----
        location /api/projects/ {
            proxy_pass http://project_upstream/projects/;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie          $http_cookie;
        }

        # ---- Schema Service ----
        location /api/schema/ {
            proxy_pass http://project_upstream/schema/;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie          $http_cookie;
        }

        # ---- Database / Query Service ----
        location /api/query/ {
            proxy_pass http://database_upstream/query/;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie          $http_cookie;
        }

        # ---- Audit Log — BUG-5 FIX: remove trailing slash to match /query/audit-logs route ----
        location /api/auditlog {
            proxy_pass http://database_upstream/query/audit-logs;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie          $http_cookie;
        }

        # ---- Analytics Service ----
        location /api/analytics/ {
            proxy_pass http://analytics_upstream/analytics/;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Cookie          $http_cookie;
        }

        # ---- Internal API Key Validation ----
        location = /_validate_api_key {
            internal;
            proxy_pass http://project_upstream/projects/validate-api-key;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header x-api-key      $http_x_api_key;
        }

        # ---- PostgREST (API Key protected) — BUG-8: schema profile forwarding ----
        # PostgREST uses Accept-Profile / Content-Profile to switch schemas.
        # The schema must also be listed in PGRST_DB_SCHEMAS (see docker-compose).
        # Dynamic project schemas are handled by the reload trigger in docker-compose.
        location /api/rest/ {
            auth_request /_validate_api_key;
            auth_request_set $auth_schema $upstream_http_x_schema_name;

            proxy_pass http://postgrest_upstream/;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            # Forward schema profile to PostgREST for per-project isolation
            proxy_set_header Accept-Profile  $auth_schema;
            proxy_set_header Content-Profile $auth_schema;
        }

        # ---- Next.js Frontend (catch-all) ----
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket support for Next.js HMR (dev) and live features
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
