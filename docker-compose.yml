services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: rapidbase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rapidbase-network

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: rapidbase-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rapidbase-network

  # ============================================
  # PostgREST — Auto-generated REST API
  # ============================================
  postgrest:
    image: postgrest/postgrest:v12.2.8
    container_name: rapidbase-postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: ${PGRST_DB_URI}
      PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE}
      PGRST_DB_SCHEMAS: "public"
      PGRST_SERVER_PORT: "3001"
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost/api/rest
      PGRST_DB_PRE_CONFIG: "postgrest.pre_config"
      PGRST_DB_CHANNEL_ENABLED: "true"
      PGRST_DB_CONFIG: "true"
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rapidbase-network

  # ============================================
  # Auth Service
  # ============================================
  auth-service:
    image: ${DOCKERHUB_USERNAME}/auth-service:latest
    container_name: rapidbase-auth
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      COOKIE_SECRET: ${COOKIE_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 4001
    expose:
      - "4001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # healthcheck is defined in the Dockerfile (Distroless has no shell)
    networks:
      - rapidbase-network

  # ============================================
  # Project Service
  # ============================================
  project-service:
    image: ${DOCKERHUB_USERNAME}/project-service:latest
    container_name: rapidbase-project
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 4002
    expose:
      - "4002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # healthcheck is defined in the Dockerfile (Distroless has no shell)
    networks:
      - rapidbase-network

  # ============================================
  # Database Service
  # ============================================
  database-service:
    image: ${DOCKERHUB_USERNAME}/database-service:latest
    container_name: rapidbase-database
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}
      PORT: 4003
    expose:
      - "4003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # healthcheck is defined in the Dockerfile (Distroless has no shell)
    networks:
      - rapidbase-network

  # ============================================
  # Analytics Service
  # ============================================
  analytics-service:
    image: ${DOCKERHUB_USERNAME}/analytics-service:latest
    container_name: rapidbase-analytics
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4004
    expose:
      - "4004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # healthcheck is defined in the Dockerfile (Distroless has no shell)
    networks:
      - rapidbase-network

  # ============================================
  # Frontend (Next.js)
  # ============================================
  frontend:
    image: ${DOCKERHUB_USERNAME}/frontend:latest
    container_name: rapidbase-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      auth-service:
        condition: service_healthy
      project-service:
        condition: service_healthy
    networks:
      - rapidbase-network

  # ============================================
  # Redis Insight — UI for Redis
  # ============================================
  redis-insight:
    image: redis/redisinsight:latest
    container_name: rapidbase-redis-insight
    restart: unless-stopped
    ports:
      - "8001:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rapidbase-network

  # ============================================
  # pgAdmin — UI for PostgreSQL
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rapidbase-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rapidbase-network

  # ============================================
  # Nginx API Gateway — Port 80
  # ============================================
  nginx-gateway:
    image: ${DOCKERHUB_USERNAME}/nginx-gateway:latest
    container_name: rapidbase-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - auth-service
      - project-service
      - database-service
      - analytics-service
      - postgrest
    networks:
      - rapidbase-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  redisinsight_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  rapidbase-network:
    driver: bridge
